<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メモ帳</title>

<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header>

    <h1>メモ帳</h1>

    <button id="newNoteBtn">
        ＋
    </button>

</header>

<main>

    <section id="listScreen">

        <ul id="noteList"></ul>

    </section>

    <section class="editor hidden" id="editor">

    <div class="editor-buttons">

        <button id="backBtn">
            ← 戻る
        </button>

        <button id="saveBtn">
            保存
        </button>

    </div>

    <input
        type="text"
        id="titleInput"
        placeholder="タイトル"
    >

    <textarea
        id="contentInput"
        placeholder="本文"
    ></textarea>

    <div id="charCount">
        文字数：0
    </div>

</section>

</main>

<script type="module" src="./js/main.js"></script>

</body>
</html>
